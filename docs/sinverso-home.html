<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SIN VERSO — El manual de socorro adulto</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#080810;
--surface:#10101c;
--card:#13131f;
--border:#20203a;
--text:#eeeef5;
--muted:#9494b8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:var(--bg);
color:var(--text);
font-family:'DM Sans',sans-serif;
overflow-x:hidden;
}

/* HEADER */
header{
padding:60px 20px 50px;
text-align:center;
background:linear-gradient(180deg,#0c0c1a,#080810);
}

.logo{
font-family:'Bebas Neue',sans-serif;
font-size:clamp(56px,14vw,120px);
letter-spacing:4px;
background:linear-gradient(135deg,#fff,#c084fc,#818cf8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tagline{
margin-top:10px;
color:var(--muted);
font-size:16px;
}

/* MAIN */
main{
padding:16px 16px 100px;
max-width:680px;
margin:auto;
}

/* TARJETAS */
.guia-card{
background:var(--card);
border:1px solid var(--border);
border-radius:15px;
padding:14px;
text-decoration:none;
display:flex;
gap:10px;
margin-bottom:10px;
color:var(--text);
}

.guia-card:hover{
border-color:#818cf8;
}

/* BOTTOM BAR */
.bottom-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:#0c0c18;
border-top:1px solid var(--border);
display:flex;
justify-content:space-around;
align-items:center;
z-index:999;
}

.bottom-btn{
display:flex;
flex-direction:column;
align-items:center;
font-size:11px;
text-decoration:none;
color:var(--muted);
}

.bottom-btn span{
font-size:22px;
margin-bottom:2px;
}

.bottom-btn.active{
color:#818cf8;
}

/* BOTON CENTRAL */
.bottom-btn.main{
background:#25D366;
color:#fff;
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
margin-top:-20px;
box-shadow:0 4px 20px rgba(0,0,0,.4);
}

/* FOOTER */
footer{
text-align:center;
padding:30px 20px;
color:var(--muted);
font-size:13px;
}
</style>
</head>

<body>

<header>
<div class="logo">SIN VERSO</div>
<p class="tagline">El manual de socorro adulto que nadie te dio</p>
</header>

<main>

<a href="#" class="guia-card">
<div>🧮</div>
<div>
<strong>Calculadoras</strong><br>
BTU · Solar · Consumo
</div>
</a>

<a href="#" class="guia-card">
<div>💻</div>
<div>
<strong>Notebooks</strong><br>
Cómo elegir sin verso
</div>
</a>

<a href="#" class="guia-card">
<div>📱</div>
<div>
<strong>Celulares</strong><br>
Qué conviene hoy
</div>
</a>

</main>

<footer>
SIN VERSO — sin humo
</footer>

<!-- BARRA INFERIOR -->
<div class="bottom-bar">

<a href="index.html" class="bottom-btn active">
<span>🏠</span>
HOME
</a>

<a href="https://wa.me/?text=Mirá SIN VERSO — el manual de compras que necesitaba: sinverso.com" target="_blank" class="bottom-btn main">
💬
</a>

<a href="#" class="bottom-btn">
<span>⋯</span>
MÁS
</a>

</div>

</body>
</html>
